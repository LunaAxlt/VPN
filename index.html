<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🔔 ТРЦ ГАЛАКТИКА • Центр управления безопасностью</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #0a1622;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .dashboard {
      max-width: 1600px;
      width: 100%;
      background: #f0f5fc;
      border-radius: 36px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      border: 1px solid rgba(100, 180, 255, 0.2);
    }

    /* Шапка */
    .header {
      padding: 20px 30px;
      background: linear-gradient(105deg, #051e30 0%, #1a3f5c 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .header h1 i { color: #ffc857; margin-right: 12px; }
    .mall-badge { background: rgba(255,255,255,0.08); padding: 8px 24px; border-radius: 40px; backdrop-filter: blur(4px); }

    /* Поиск */
    .search-section {
      padding: 18px 28px;
      background: #d9e6f2;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid #b8cee4;
    }
    .search-wrapper {
      flex: 2; min-width: 260px; display: flex; background: white; border-radius: 60px; padding: 4px 6px 4px 20px;
      align-items: center; border: 1px solid #9bb7d4;
    }
    .search-wrapper input { border: none; padding: 14px; font-size: 1rem; width: 100%; outline: none; background: transparent; }
    .filter-badge {
      background: #1f4e79; color: white; padding: 10px 24px; border-radius: 40px; display: flex; align-items: center;
      gap: 8px; cursor: pointer; font-weight: 500; transition: 0.2s;
    }
    .filter-badge:hover { background: #2c6490; }

    /* Контент */
    .content { padding: 24px 28px; }

    /* Статус-карточки */
    .status-grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: white; border-radius: 24px; padding: 18px 16px; box-shadow: 0 6px 12px rgba(0,0,0,0.03);
      border: 1px solid #cddef0;
    }
    .stat-title { display: flex; align-items: center; gap: 10px; color: #1a3b55; font-weight: 500; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #0b1e2e; margin-top: 8px; }
    .stat-sub { font-size: 0.85rem; color: #4a6f8f; margin-top: 4px; }

    /* Панели */
    .main-panels { display: grid; grid-template-columns: 1.5fr 1.2fr; gap: 24px; margin-bottom: 24px; }

    /* Левая часть */
    .left-complex { display: flex; flex-direction: column; gap: 20px; }

    /* Камеры */
    .cameras-panel {
      background: white; border-radius: 28px; padding: 22px; border: 1px solid #c7d9ec;
      box-shadow: 0 8px 16px rgba(0,0,0,0.04);
    }
    .cameras-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 18px 0 8px;
    }
    .camera-feed {
      background: #0d1c29; border-radius: 18px; overflow: hidden; aspect-ratio: 16/10;
      position: relative; border: 2px solid #2e577a;
    }
    .camera-feed video, .camera-feed .mock-cam {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .mock-cam {
      background: linear-gradient(145deg, #132433, #1e3a52);
      display: flex; align-items: center; justify-content: center; color: white;
      font-size: 1.2rem; font-weight: bold; text-shadow: 0 2px 4px black;
    }
    .cam-label {
      position: absolute; bottom: 8px; left: 10px; background: rgba(0,0,0,0.7);
      color: white; padding: 4px 12px; border-radius: 40px; f


ont-size: 0.8rem;
      backdrop-filter: blur(2px);
    }
    .cam-status {
      position: absolute; top: 8px; right: 10px; width: 12px; height: 12px;
      border-radius: 12px; background: #2ecc71; box-shadow: 0 0 12px #2ecc71;
    }

    /* Датчики */
    .sensors-panel {
      background: white; border-radius: 28px; padding: 22px; border: 1px solid #c7d9ec;
    }
    .sensor-list {
      display: flex; flex-wrap: wrap; gap: 12px 18px; margin-top: 18px; max-height: 280px; overflow-y: auto;
    }
    .sensor-item {
      background: #e6f0fa; padding: 12px 20px; border-radius: 40px; display: flex;
      align-items: center; gap: 14px; font-weight: 500; border: 1px solid #b8d0e8;
      cursor: pointer; transition: 0.1s;
    }
    .sensor-item i { color: #1f4e79; font-size: 1.2rem; }
    .sensor-info { display: flex; flex-direction: column; }
    .sensor-name { font-weight: 600; color: #0b2a41; }
    .sensor-location { font-size: 0.8rem; color: #3c6482; }
    .sensor-value {
      background: #1f4e79; color: white; padding: 6px 16px; border-radius: 40px;
      font-size: 0.95rem; margin-left: 8px; font-weight: 600;
    }

    /* Сценарии */
    .scenario-panel {
      background: white; border-radius: 28px; padding: 22px; border: 1px solid #c7d9ec;
    }
    .scenario-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 18px 0 16px;
    }
    .scenario-btn {
      background: #ecf3fc; border: 1.5px solid #b0cae3; border-radius: 20px;
      padding: 16px 6px; text-align: center; cursor: pointer; transition: 0.15s; font-weight: 600;
    }
    .scenario-btn i { font-size: 26px; display: block; margin-bottom: 8px; color: #1e4f76; }
    .scenario-btn.active { background: #1f4e79; border-color: #0b2d47; color: white; }
    .scenario-btn.active i { color: #ffd966; }
    .broadcast-actions { display: flex; gap: 16px; margin-top: 12px; }
    .btn {
      padding: 14px 24px; border-radius: 48px; border: none; font-weight: 600; display: inline-flex;
      align-items: center; gap: 10px; cursor: pointer; background: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: 1px solid transparent; transition: 0.2s;
    }
    .btn-primary { background: #1f4e79; color: white; flex: 1; }
    .btn-danger { background: #c0392b; color: white; }
    .btn-outline { border: 1.5px solid #b4c8da; background: white; }

    /* Правая панель (зоны) */
    .zone-panel {
      background: white; border-radius: 28px; padding: 24px; border: 1px solid #c7d9ec;
    }
    .zone-item {
      display: flex; align-items: center; justify-content: space-between; padding: 16px 0;
      border-bottom: 1px solid #d9e6f2;
    }
    .volume-slider { display: flex; align-items: center; gap: 16px; }
    input[type="range"] { width: 140px; }
    .vol-value { min-width: 48px; font-weight: 700; color: #1a3b55; }
    .zone-toggle {
      width: 48px; height: 26px; background: #b0c6db; border-radius: 40px; position: relative;
      cursor: pointer; transition: 0.2s; margin-left: 12px;
    }
    .zone-toggle.active { background: #1f4e79; }
    .zone-toggle::after {
      content: ''; width: 22px; height: 22px; background: white; border-radius: 22px;
      position: absolute; top: 2px; left: 2px; transition: 0.2s;
    }
    .zone-toggle.active::after { left: 24px; }

    /* Лог */
    .log-section {
      background: #e3edf7; border-radius: 26px; padding: 20px; margin-top: 20px;
    }
    .log-entries { max-height: 160px; overflow-y: auto; }
    .log-entry {
      padding: 10px 0; border-bottom: 1px dashed #b0c8e0; display: flex; align-items: center;
    }

    .pulse-alert { animation: pulse-border 1s infinite; }
    @keyframes pulse-border {
      0% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.6); }
      70% { box-shadow: 0 0 0 15px rgba(192, 57, 43, 0); }
      100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); }
    }
  </style>
</head>
<body>

<div class="dashboard">
  <div class="header">
    <h1><i class="fas fa-shield-virus"></i> ТРЦ «ГАЛАК


ТИКА» • СИСТЕМА ОПОВЕЩЕНИЯ</h1>
    <div class="mall-badge"><i class="fas fa-sync-alt fa-spin"></i> ОНЛАЙН • ЦЕНТРАЛЬНЫЙ ПОСТ</div>
  </div>

  <!-- ПОИСК -->
  <div class="search-section">
    <div class="search-wrapper">
      <i class="fas fa-search" style="color:#1f4e79;"></i>
      <input type="text" id="searchInput" placeholder="🔍 Поиск датчиков, камер, зон... (например 'дым', 'паркинг', 'CO₂')">
    </div>
    <div class="filter-badge" id="resetSearchBtn"><i class="fas fa-times-circle"></i> Сброс</div>
    <div class="filter-badge" id="showAllSensors"><i class="fas fa-microchip"></i> Все датчики</div>
  </div>

  <div class="content">
    <!-- СТАТУС-КАРТОЧКИ (настраиваемые) -->
    <div class="status-grid" id="statusGridContainer"></div>

    <!-- ОСНОВНЫЕ ПАНЕЛИ -->
    <div class="main-panels">
      <!-- ЛЕВАЯ: КАМЕРЫ + ДАТЧИКИ + СЦЕНАРИИ -->
      <div class="left-complex">
        <!-- КАМЕРЫ (отображаются всегда) -->
        <div class="cameras-panel">
          <h3 style="display: flex; gap:10px;"><i class="fas fa-video" style="color:#1f4e79;"></i> ВИДЕОНАБЛЮДЕНИЕ • 6 КАМЕР</h3>
          <div class="cameras-grid" id="camerasGrid"></div>
          <button class="btn btn-outline" id="refreshCamerasBtn" style="margin-top:12px;"><i class="fas fa-sync-alt"></i> Обновить камеры</button>
        </div>

        <!-- ДАТЧИКИ (с поиском и местоположением) -->
        <div class="sensors-panel">
          <div style="display:flex; justify-content:space-between;">
            <h3><i class="fas fa-sensor"></i> ДАТЧИКИ И УСТРОЙСТВА</h3>
            <span id="sensorCount">12 датчиков</span>
          </div>
          <div class="sensor-list" id="sensorContainer"></div>
        </div>

        <!-- СЦЕНАРИИ ТРЕВОГИ -->
        <div class="scenario-panel">
          <h3><i class="fas fa-exclamation-triangle" style="color:#e67e22;"></i> СЦЕНАРИИ ОПОВЕЩЕНИЯ</h3>
          <div class="scenario-grid" id="scenarioGrid"></div>
          <div class="broadcast-actions">
            <button class="btn btn-primary" id="broadcastBtn"><i class="fas fa-broadcast-tower"></i> ЗАПУСТИТЬ ТРЕВОГУ</button>
            <button class="btn btn-danger" id="stopBroadcastBtn"><i class="fas fa-stop-circle"></i> СТОП</button>
            <button class="btn btn-outline" id="testSoundBtn"><i class="fas fa-volume-up"></i> Тест звука</button>
          </div>
        </div>
      </div>

      <!-- ПРАВАЯ: ЗОНЫ ОПОВЕЩЕНИЯ + НАСТРОЙКИ -->
      <div class="zone-panel">
        <h3 style="display:flex; gap:12px;"><i class="fas fa-map-signs"></i> ЗОНЫ ОПОВЕЩЕНИЯ</h3>
        <div id="zoneContainer"></div>
        <div style="display: flex; gap:12px; margin: 24px 0 12px;">
          <button class="btn btn-outline" id="selectAllZones"><i class="far fa-check-square"></i> Все зоны</button>
          <button class="btn btn-outline" id="muteAllZones"><i class="fas fa-volume-mute"></i> Mute</button>
          <button class="btn btn-outline" id="resetZonesBtn"><i class="fas fa-undo-alt"></i> Сброс</button>
        </div>
        <div style="background:#e0ecf7; border-radius:24px; padding:18px; margin-top:10px;">
          <i class="fas fa-info-circle"></i> <strong>Статус системы:</strong> <span id="globalStatus">Готов к работе</span>
        </div>
        <!-- настройка статусов -->
        <div style="margin-top:18px;">
          <label><i class="fas fa-sliders-h"></i> Настройка отображения статусов:</label>
          <select id="statusPreset" style="margin-left:12px; padding:6px 12px; border-radius:30px;">
            <option value="default">Стандартный</option>
            <option value="compact">Компактный</option>
            <option value="detailed">Детальный</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ЖУРНАЛ -->
    <div class="log-section">
      <div style="display:flex;"><i class="fas fa-history"></i><h4>ЖУРНАЛ СОБЫТИЙ</h4><span style="margin-left:auto; cursor:pointer;" id="clearLogBtn"><i class="fas fa-trash-alt"></i></sp


an></div>
      <div class="log-entries" id="logContainer"></div>
    </div>
  </div>
</div>

<script>
  (() => {
    // ---------- ДАННЫЕ ----------
    // Статусы (можно настраивать)
    let statusCards = [
      { icon: 'fa-network-wired', title: 'Система', value: 'Активна', sub: 'все модули' },
      { icon: 'fa-users', title: 'Посетителей', value: '1 284', sub: 'в ТРЦ' },
      { icon: 'fa-fire', title: 'Пожар', value: 'Норма', sub: 'датчики ОК' },
      { icon: 'fa-temperature-high', title: 'Температура', value: '22.5°C', sub: 'комфорт' },
      { icon: 'fa-wind', title: 'CO₂', value: '412 ppm', sub: 'норма' },
      { icon: 'fa-bolt', title: 'Энергия', value: '2.4 МВт', sub: 'потребление' }
    ];

    // Датчики с местоположением
    let sensors = [
      { name: 'Дымовой извещатель', icon: 'fa-smog', value: '0.0%', location: 'Атриум, 1 этаж', type:'smoke' },
      { name: 'Дымовой (паркинг)', icon: 'fa-smog', value: '0.1%', location: 'Паркинг P2', type:'smoke' },
      { name: 'Температура', icon: 'fa-thermometer-half', value: '21°C', location: 'Склад B12', type:'temp' },
      { name: 'CO₂', icon: 'fa-wind', value: '390 ppm', location: 'Фудкорт', type:'co2' },
      { name: 'Движение', icon: 'fa-walking', value: 'Есть', location: 'Галерея 2', type:'motion' },
      { name: 'Открытие двери', icon: 'fa-door-open', value: 'Закрыто', location: 'Вход №3', type:'door' },
      { name: 'Вибрация', icon: 'fa-wave-square', value: '0.01g', location: 'Эскалатор', type:'vibro' },
      { name: 'Газ', icon: 'fa-fire', value: '0%', location: 'Кухня фудкорт', type:'gas' },
      { name: 'Влажность', icon: 'fa-tint', value: '48%', location: 'Кинотеатр', type:'hum' },
      { name: 'Освещение', icon: 'fa-sun', value: '540 lx', location: 'Атриум', type:'light' },
      { name: 'Шум', icon: 'fa-volume-up', value: '62 дБ', location: 'Детская зона', type:'noise' },
      { name: 'Пожарный ИП', icon: 'fa-bell', value: 'Норма', location: 'Серверная', type:'fire' }
    ];

    const zones = [
      { name: 'Торговая галерея', icon: 'fa-shopping-cart', volume: 75, active: true },
      { name: 'Фудкорт', icon: 'fa-utensils', volume: 65, active: true },
      { name: 'Кинотеатр', icon: 'fa-film', volume: 60, active: true },
      { name: 'Парковка', icon: 'fa-car', volume: 85, active: true },
      { name: 'Атриум / Холлы', icon: 'fa-elevator', volume: 70, active: true }
    ];

    const scenarios = [
      { id: 'fire', name: 'Пожар', icon: 'fa-fire-extinguisher' },
      { id: 'evac', name: 'Эвакуация', icon: 'fa-people-arrows' },
      { id: 'lost', name: 'Ребёнок', icon: 'fa-child' },
      { id: 'tech', name: 'Сбой', icon: 'fa-tools' },
      { id: 'weather', name: 'Шторм', icon: 'fa-cloud-rain' },
      { id: 'security', name: 'Охрана', icon: 'fa-shield' },
      { id: 'test', name: 'Тест', icon: 'fa-vial' },
      { id: 'custom', name: 'Свой', icon: 'fa-sliders-h' }
    ];

    let activeScenario = 'fire';
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let alarmBuffer = null;
    let currentSource = null;

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    const log = (msg, icon='fa-info-circle', alert=false) => {
      const c = document.getElementById('logContainer');
      const d = document.createElement('div'); d.className='log-entry';
      d.innerHTML = `<span style="background:#d0e2f1; padding:4px 12px; border-radius:40px; margin-right:14px;">${new Date().toLocaleTimeString().slice(0,5)}</span>
        <i class="fas ${icon}" style="margin-right:10px; color:${alert?'#c0392b':'#1f4e79'};"></i>${msg}`;
      c.prepend(d); if(c.children.length>12) c.lastChild.remove();
    };

    async function initAudio() {
      if(alarmBuffer) return;
      const sr = audioCtx.sampleRate;
      const buf = audioCtx.createBuffer(1, sr*2, sr);
      const data = buf.getChannelData(0);
      for (let i=0; i<buf.length; i++) {
        const t = i/sr;
        data[i] = 0.3 * (Math.sin(2*Math.PI*900*t) + 0.3


*Math.sin(2*Math.PI*1300*t)) * Math.exp(-t*0.8);
      }
      alarmBuffer = buf;
    }
    function playAlarm(loop=true) {
      if(!alarmBuffer) return;
      if(currentSource) try{currentSource.stop();}catch(e){}
      const src = audioCtx.createBufferSource(); src.buffer = alarmBuffer;
      src.loop = loop; src.connect(audioCtx.destination); src.start();
      currentSource = src;
    }
    function stopAlarm() { if(currentSource) { try{currentSource.stop();}catch(e){} currentSource=null; } }

    // Рендер статусов
    function renderStatusCards() {
      const grid = document.getElementById('statusGridContainer');
      grid.innerHTML = statusCards.map(c => `
        <div class="stat-card">
          <div class="stat-title"><i class="fas ${c.icon}"></i> ${c.title}</div>
          <div class="stat-value">${c.value}</div>
          <div class="stat-sub">${c.sub}</div>
        </div>`).join('');
    }

    // Камеры (отображаются всегда, даже без доступа)
    function renderCameras() {
      const grid = document.getElementById('camerasGrid');
      const locations = ['Главный вход','Паркинг P1','Торговая галерея','Фудкорт','Кинотеатр','Склад'];
      grid.innerHTML = locations.map((loc, i) => `
        <div class="camera-feed" id="cam${i}">
          <div class="mock-cam"><i class="fas fa-video" style="margin-right:8px;"></i> Камера ${i+1}
${loc}</div>
          <span class="cam-label">${loc}</span>
          <span class="cam-status" style="background:#2ecc71;"></span>
        </div>`).join('');
      // Попытка получить реальные камеры
      navigator.mediaDevices.getUserMedia({video:true}).then(stream => {
        const videos = grid.querySelectorAll('.camera-feed');
        videos.forEach((v,idx) => {
          if(idx===0 || idx===2) {
            const video = document.createElement('video'); video.autoplay = true; video.muted = true;
            video.srcObject = stream; video.style.width='100%'; video.style.height='100%'; video.style.objectFit='cover';
            v.innerHTML = ''; v.appendChild(video);
            v.innerHTML += `<span class="cam-label">${locations[idx]}</span><span class="cam-status" style="background:#2ecc71;"></span>`;
          }
        });
        log('✅ Камеры активированы (частично реальные)', 'fa-video');
      }).catch(()=> log('📹 Используются заглушки камер (разрешите камеру)', 'fa-video'));
    }

    // Датчики
    function renderSensors(filter='') {
      const cont = document.getElementById('sensorContainer');
      const f = filter.toLowerCase();
      const filtered = sensors.filter(s => s.name.toLowerCase().includes(f) || s.location.toLowerCase().includes(f) || s.type.includes(f));
      cont.innerHTML = filtered.map(s => `
        <div class="sensor-item" data-sensor='${JSON.stringify(s)}'>
          <i class="fas ${s.icon}"></i>
          <div class="sensor-info"><span class="sensor-name">${s.name}</span><span class="sensor-location"><i class="fas fa-map-pin"></i> ${s.location}</span></div>
          <span class="sensor-value">${s.value}</span>
        </div>`).join('');
      document.getElementById('sensorCount').innerText = `${filtered.length} датчиков`;
      document.querySelectorAll('.sensor-item').forEach(el => el.addEventListener('click', (e) => {
        const s = JSON.parse(el.dataset.sensor);
        log(`📟 ${s.name} (${s.location}) → ${s.value}`, 'fa-microchip');
      }));
    }

    // Сценарии
    function renderScenarios() {
      const grid = document.getElementById('scenarioGrid');
      grid.innerHTML = scenarios.map(s => `
        <div class="scenario-btn ${s.id===activeScenario?'active':''}" data-id="${s.id}">
          <i class="fas ${s.icon}"></i>${s.name}
        </div>`).join('');
      grid.querySelectorAll('.scenario-btn').forEach(b => b.addEventListener('click', () => {
        grid.querySelectorAll('.scenario-btn').forEach(bb=>bb.classList.remove('active'));
        b.classList.add('active'); activeScenario = b.dataset.id;
        log(`📌 Сценарий:
porkbun.com | parked domain
porkbun.com | parked domain
dataset.id


${scenarios.find(x=>x.id===activeScenario).name}`, 'fa-tag');
      }));
    }

    // Зоны
    function renderZones() {
      const cont = document.getElementById('zoneContainer');
      cont.innerHTML = zones.map((z,i) => `
        <div class="zone-item">
          <span><i class="fas ${z.icon}"></i> ${z.name}</span>
          <div style="display:flex; align-items:center;">
            <div class="volume-slider">
              <input type="range" min="0" max="100" value="${z.volume}" data-idx="${i}" class="zoneVol">
              <span class="vol-value" id="zoneVolVal${i}">${z.volume}%</span>
            </div>
            <div class="zone-toggle ${z.active?'active':''}" data-idx="${i}"></div>
          </div>
        </div>`).join('');
      document.querySelectorAll('.zoneVol').forEach(s => s.addEventListener('input', e => {
        const idx = e.target.dataset.idx; zones[idx].volume = e.target.value;
        document.getElementById(`zoneVolVal${idx}`).innerText = e.target.value+'%';
        log(`🎚️ Громкость зоны изменена`, 'fa-sliders-h');
      }));
      document.querySelectorAll('.zone-toggle').forEach(t => t.addEventListener('click', e => {
        const idx = t.dataset.idx; zones[idx].active = !zones[idx].active;
        t.classList.toggle('active');
        log(`🔛 Зона "${zones[idx].name}" ${zones[idx].active?'включена':'отключена'}`);
      }));
    }

    // Инициализация
    function init() {
      renderStatusCards();
      renderCameras();
      renderSensors();
      renderScenarios();
      renderZones();

      document.body.addEventListener('click', async ()=>{
        if(audioCtx.state==='suspended') await audioCtx.resume();
        await initAudio();
      }, {once:false});

      document.getElementById('broadcastBtn').addEventListener('click', ()=>{
        const s = scenarios.find(x=>x.id===activeScenario);
        log(`🚨 ЗАПУЩЕНА ТРЕВОГА: ${s.name}`, 'fa-exclamation-triangle', true);
        document.querySelector('.scenario-panel').classList.add('pulse-alert');
        setTimeout(()=>document.querySelector('.scenario-panel').classList.remove('pulse-alert'),2000);
        playAlarm(true);
        document.getElementById('globalStatus').innerText = `Тревога: ${s.name}`;
        if(activeScenario==='fire') statusCards[2].value = 'ТРЕВОГА';
        renderStatusCards();
      });
      document.getElementById('stopBroadcastBtn').addEventListener('click', ()=>{
        stopAlarm(); log('🛑 Оповещение остановлено'); 
        document.getElementById('globalStatus').innerText = 'Готов';
        statusCards[2].value = 'Норма'; renderStatusCards();
      });
      document.getElementById('testSoundBtn').addEventListener('click', ()=>{
        initAudio().then(()=>{ playAlarm(false); log('🔔 Тестовый сигнал'); });
      });
      document.getElementById('selectAllZones').addEventListener('click', ()=>{
        zones.forEach(z=>z.active=true); renderZones(); log('✅ Все зоны включены');
      });
      document.getElementById('muteAllZones').addEventListener('click', ()=>{
        zones.forEach(z=>z.volume=0); renderZones(); log('🔇 Mute');
      });
      document.getElementById('resetZonesBtn').addEventListener('click', ()=>{
        zones[0].volume=75; zones[1].volume=65; zones[2].volume=60; zones[3].volume=85; zones[4].volume=70;
        zones.forEach(z=>z.active=true); renderZones(); log('🔄 Зоны сброшены');
      });
      document.getElementById('searchInput').addEventListener('input', e=> renderSensors(e.target.value));
      document.getElementById('resetSearchBtn').addEventListener('click', ()=>{
        document.getElementById('searchInput').value=''; renderSensors('');
      });
      document.getElementById('showAllSensors').addEventListener('click', ()=> renderSensors(''));
      document.getElementById('refreshCamerasBtn').addEventListener('click', renderCameras);
      document.getElementById('clearLogBtn').addEventListener('click', ()=>{
        document.getElementById('logContainer').innerHT


ML = ''; log('🧹 Журнал очищен');
      });
      document.getElementById('statusPreset').addEventListener('change', e => {
        if(e.target.value==='compact') statusCards = statusCards.map(c=>({...c, sub:''}));
        else if(e.target.value==='detailed') statusCards = statusCards.map(c=>({...c, sub:c.sub+' • детально'}));
        else location.reload(); 
        renderStatusCards();
      });
      log('✅ Система управления загружена', 'fa-check-circle');
    }

    init();
  })();
</script>
</body>
</html>
